<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Kilit Pro</title>
    <script src="qrcode.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        body {
            background-color: #000;
            color: #f5f5f7;
            height: 100vh;
            overflow: hidden;
            user-select: none;
            cursor: none;
        }

        /* Apple-like Ambient Background */
        .ambient-bg {
            position: absolute;
            inset: -20%;
            z-index: 0;
            background: radial-gradient(circle at 50% 50%, rgba(9, 32, 63, 1) 0%, rgba(0, 0, 0, 1) 100%);
            overflow: hidden;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.6;
            animation: slow-drift 30s infinite alternate ease-in-out;
        }

        .orb-blue {
            top: 20%;
            left: 30%;
            width: 60vw;
            height: 60vw;
            background: radial-gradient(circle, #0052D4, #4364F7);
        }

        .orb-purple {
            bottom: 10%;
            right: 20%;
            width: 50vw;
            height: 50vw;
            background: radial-gradient(circle, #6FB1FC, #4364F7);
            animation-delay: -15s;
        }

        @keyframes slow-drift {
            0% {
                transform: translate(0, 0) scale(1);
            }

            100% {
                transform: translate(10%, -10%) scale(1.1);
            }
        }

        /* Apple Glassmorphism */
        .glass-panel {
            background: rgba(30, 30, 32, 0.4);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }

        .main-layout {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            height: 100vh;
            padding: 40px 60px;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .brand-section {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .app-logo {
            width: 64px;
            height: 64px;
            border-radius: 18px;
            object-fit: cover;
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .brand-text-wrapper {
            display: flex;
            flex-direction: column;
        }

        .brand-title {
            font-size: 32px;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: #fff;
            line-height: 1.1;
        }

        .board-id {
            font-size: 15px;
            color: rgba(255, 255, 255, 0.5);
            font-weight: 500;
            margin-top: 2px;
        }

        /* Connection Status */
        .connection-status {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: 6px;
            padding: 4px 10px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            width: fit-content;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .conn-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
        }

        .connection-status.online .conn-dot {
            background: #34c759;
            box-shadow: 0 0 8px #34c759;
        }

        .connection-status.online .conn-text {
            color: #34c759;
        }

        .connection-status.offline .conn-dot {
            background: #ff3b30;
            box-shadow: 0 0 8px #ff3b30;
        }

        .connection-status.offline .conn-text {
            color: #ff3b30;
        }

        .conn-text {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Clock Widget */
        .clock-widget {
            text-align: right;
        }

        .clock-time {
            font-size: 86px;
            font-weight: 300;
            line-height: 1;
            letter-spacing: -3px;
            color: #fff;
            text-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .clock-date {
            font-size: 20px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.6);
            margin-top: 8px;
            letter-spacing: 0.5px;
        }

        /* Center Content */
        .center-content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .lock-card {
            border-radius: 36px;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 420px;
            max-width: 90%;
            text-align: center;
        }

        .status-pill {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 8px 18px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 100px;
            margin-bottom: 36px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .status-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ff3b30;
            box-shadow: 0 0 12px #ff3b30;
            animation: pulse-red 2s infinite;
        }

        @keyframes pulse-red {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.4;
            }
        }

        .status-text {
            font-size: 14px;
            font-weight: 600;
            color: #fff;
            letter-spacing: 0.5px;
        }

        .qr-surface {
            background: #fff;
            padding: 20px;
            border-radius: 24px;
            margin-bottom: 32px;
            box-shadow: 0 24px 48px rgba(0, 0, 0, 0.5);
        }

        .qr-container {
            width: 220px;
            height: 220px;
        }

        .qr-container canvas,
        .qr-container img {
            max-width: 100% !important;
            max-height: 100% !important;
        }

        .instruction {
            font-size: 17px;
            color: rgba(255, 255, 255, 0.7);
            line-height: 1.5;
            font-weight: 400;
        }

        /* Announcements Marquee */
        .announcements-bar {
            border-radius: 20px;
            padding: 18px 32px;
            display: flex;
            align-items: center;
            gap: 24px;
            margin-bottom: 24px;
            overflow: hidden;
        }

        .bell-icon {
            min-width: 24px;
            height: 24px;
            color: #0A84FF;
        }

        .bell-icon svg {
            width: 24px;
            height: 24px;
        }

        .marquee-container {
            flex: 1;
            overflow: hidden;
            position: relative;
            white-space: nowrap;
        }

        .marquee-content {
            display: inline-block;
            animation: marquee 30s linear infinite;
            font-size: 18px;
            font-weight: 400;
        }

        .marquee-content span {
            margin-right: 60px;
            color: rgba(255, 255, 255, 0.85);
        }

        .marquee-content span strong {
            color: #0A84FF;
            font-weight: 600;
            margin-right: 8px;
        }

        @keyframes marquee {
            0% {
                transform: translateX(100%);
            }

            100% {
                transform: translateX(-100%);
            }
        }

        /* Footer */
        .footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .school-name {
            font-size: 16px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.5);
        }

        .system-version {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.3);
        }

        /* Overlays */
        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            z-index: 100;
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
        }

        .overlay.show {
            display: flex;
        }

        .setup-card {
            padding: 48px;
            width: 480px;
            border-radius: 36px;
        }

        .setup-title {
            font-size: 32px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 12px;
            color: #fff;
        }

        .setup-subtitle {
            text-align: center;
            color: rgba(255, 255, 255, 0.6);
            font-size: 16px;
            margin-bottom: 36px;
        }

        .setup-input {
            width: 100%;
            padding: 18px 22px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 18px;
            color: #fff;
            font-size: 17px;
            outline: none;
            margin-bottom: 20px;
            transition: all 0.2s;
        }

        .setup-input:focus {
            border-color: #0A84FF;
            background: rgba(10, 132, 255, 0.05);
        }

        .setup-btn {
            width: 100%;
            padding: 20px;
            background: #0A84FF;
            border: none;
            border-radius: 18px;
            color: #fff;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 10px;
        }

        .setup-btn:hover {
            background: #007aff;
            transform: scale(0.98);
        }

        .setup-error {
            color: #ff3b30;
            font-size: 15px;
            text-align: center;
            margin-top: 16px;
            display: none;
            font-weight: 500;
        }

        .unlock-icon {
            font-size: 100px;
            animation: unlockScale 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .unlock-text {
            font-size: 44px;
            font-weight: 700;
            margin-top: 24px;
            color: #34c759;
        }

        .unlock-user {
            font-size: 24px;
            color: rgba(255, 255, 255, 0.9);
            margin-top: 12px;
            font-weight: 500;
        }

        .unlock-method {
            font-size: 15px;
            color: rgba(255, 255, 255, 0.4);
            margin-top: 8px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        @keyframes unlockScale {
            0% {
                transform: scale(0.5);
                opacity: 0;
            }

            50% {
                transform: scale(1.1);
                opacity: 1;
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        /* Media Queries for small screens (VirtualBox) */
        @media (max-width: 900px),
        (max-height: 700px) {
            .main-layout {
                padding: 24px 32px;
            }

            .clock-time {
                font-size: 56px;
            }

            .clock-date {
                font-size: 16px;
            }

            .brand-title {
                font-size: 24px;
            }

            .app-logo {
                width: 48px;
                height: 48px;
                border-radius: 12px;
            }

            .lock-card {
                padding: 32px;
                border-radius: 28px;
                width: 360px;
            }

            .qr-surface {
                padding: 16px;
                margin-bottom: 24px;
            }

            .qr-container {
                width: 160px;
                height: 160px;
            }

            .instruction {
                font-size: 15px;
            }

            .announcements-bar {
                padding: 14px 24px;
                border-radius: 16px;
                margin-bottom: 16px;
            }

            .marquee-content {
                font-size: 16px;
            }

            .setup-card {
                padding: 32px;
                width: 400px;
            }

            .setup-title {
                font-size: 28px;
            }

            .setup-input {
                padding: 14px 18px;
                font-size: 15px;
                margin-bottom: 16px;
            }

            .setup-btn {
                padding: 16px;
                font-size: 16px;
            }
        }
    </style>
</head>

<body>

    <div class="ambient-bg">
        <div class="orb orb-blue"></div>
        <div class="orb orb-purple"></div>
    </div>

    <div class="main-layout">
        <!-- Header -->
        <div class="header">
            <div class="brand-section">
                <img src="BURAYA KENDİ LOGONUZU EKLEYİNİZ" />
                <div class="brand-text-wrapper">
                    <div class="brand-title">E-KİLİT</div>
                    <div class="board-id" id="boardCode">Yükleniyor...</div>
                    <div class="connection-status offline" id="connStatus">
                        <div class="conn-dot"></div>
                        <span class="conn-text">Çevrimdışı</span>
                    </div>
                </div>
            </div>

            <div class="clock-widget">
                <div class="clock-time" id="clockTime">--:--</div>
                <div class="clock-date" id="clockDate">-- -- --</div>
            </div>
        </div>

        <!-- Center QR -->
        <div class="center-content">
            <div class="lock-card glass-panel">
                <div class="status-pill">
                    <div class="status-indicator"></div>
                    <div class="status-text">Sistem Kilitli</div>
                </div>

                <div class="qr-surface">
                    <div class="qr-container" id="qrContainer"></div>
                </div>

                <div class="instruction">
                    Mobil uygulama veya USB anahtar<br>ile kilidi açabilirsiniz.
                </div>
            </div>
        </div>

        <!-- Announcements -->
        <div class="announcements-bar glass-panel" id="announcementsBar" style="display: none;">
            <div class="bell-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
                    <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
                </svg>
            </div>
            <div class="marquee-container">
                <div class="marquee-content" id="marqueeContent"></div>
            </div>
        </div>

        <!-- Footer -->
        <div class="footer">
            <div class="school-name" id="schoolName">Kurum Bilgisi Alınıyor...</div>
            <div class="system-version">E-Kilit v2.0 Enterprise</div>
        </div>
    </div>

    <!-- Setup Screen -->
    <div class="overlay" id="setupScreen">
        <div class="setup-card glass-panel">
            <div class="setup-title">Sisteme Kayıt</div>
            <div class="setup-subtitle">Bu akıllı tahtayı ağa dahil edin</div>
            <input type="text" class="setup-input" id="inputSchoolCode" placeholder="Kurum Kodu (örn: OKL001)"
                autocomplete="off">
            <input type="text" class="setup-input" id="inputBoardName" placeholder="Tahta Adı (örn: Sınıf 1-A)"
                autocomplete="off">
            <button class="setup-btn" onclick="registerBoard()">Aktivasyonu Tamamla</button>
            <div class="setup-error" id="setupError"></div>
        </div>
    </div>

    <!-- Unlock Animation -->
    <div class="overlay" id="unlockOverlay">
        <div class="unlock-icon">🔓</div>
        <div class="unlock-text">Kilit Açıldı</div>
        <div class="unlock-user" id="unlockUser">Kullanıcı</div>
        <div class="unlock-method" id="unlockMethod">Yöntem</div>
    </div>

    <script>
        /* === Clock === */
        function updateClock() {
            var now = new Date();
            var h = String(now.getHours()).padStart(2, '0');
            var m = String(now.getMinutes()).padStart(2, '0');
            document.getElementById('clockTime').textContent = h + ':' + m;
            var days = ['Pazar', 'Pazartesi', 'Salı', 'Çarşamba', 'Perşembe', 'Cuma', 'Cumartesi'];
            var months = ['Ocak', 'Şubat', 'Mart', 'Nisan', 'Mayıs', 'Haziran', 'Temmuz', 'Ağustos', 'Eylül', 'Ekim', 'Kasım', 'Aralık'];
            document.getElementById('clockDate').textContent = now.getDate() + ' ' + months[now.getMonth()] + ' ' + now.getFullYear() + ', ' + days[now.getDay()];
        }
        setInterval(updateClock, 1000);
        updateClock();

        /* === QR Code === */
        var qrInstance = null;
        function updateQrCode(data) {
            var el = document.getElementById('qrContainer');
            el.innerHTML = '';
            if (!data) return;
            try {
                qrInstance = new QRCode(el, { text: data, width: 220, height: 220, colorDark: '#000000', colorLight: '#ffffff', correctLevel: QRCode.CorrectLevel.M });
            } catch (e) { el.innerHTML = '<div style="color:#999;font-size:14px;margin-top:90px;">QR Yüklenemedi</div>'; }
        }

        /* === Announcements === */
        function updateAnnouncements(data) {
            if (!data || !data.announcements || data.announcements.length === 0) {
                document.getElementById('announcementsBar').style.display = 'none';
                return;
            }

            var bar = document.getElementById('announcementsBar');
            var content = document.getElementById('marqueeContent');

            bar.style.display = 'flex';
            var html = '';

            data.announcements.forEach(function (ann) {
                html += '<span><strong>' + ann.title + '</strong> ' + ann.content + '</span>';
            });

            html += html;
            content.innerHTML = html;
        }

        /* === UI Actions === */
        function showSetupScreen() { document.getElementById('setupScreen').classList.add('show') }
        function hideSetupScreen() { document.getElementById('setupScreen').classList.remove('show') }
        function showSetupError(msg) { var e = document.getElementById('setupError'); e.textContent = msg; e.style.display = 'block' }
        function registerBoard() {
            var sc = document.getElementById('inputSchoolCode').value.trim();
            var bn = document.getElementById('inputBoardName').value.trim();
            if (!sc || !bn) { showSetupError('Lütfen tüm alanları doldurun'); return; }
            document.getElementById('setupError').style.display = 'none';
            if (window.chrome && window.chrome.webview) {
                window.chrome.webview.postMessage({ type: 'register', schoolCode: sc, boardName: bn });
            }
        }

        function updateBoardInfo(info) {
            if (info.code) document.getElementById('boardCode').textContent = info.code;
            if (info.school) document.getElementById('schoolName').textContent = info.school;
        }

        function showUnlockAnimation(data) {
            var o = document.getElementById('unlockOverlay');
            document.getElementById('unlockUser').textContent = data.user || '';
            var methods = { usb: 'USB Anahtar', qr: 'QR Kod', remote: 'Uzaktan', masterkey: 'Master Key' };
            document.getElementById('unlockMethod').textContent = methods[data.method] || data.method || '';
            o.classList.add('show');
        }
        function hideUnlockOverlay() { document.getElementById('unlockOverlay').classList.remove('show') }

        /* === C# Message Listener === */
        if (window.chrome && window.chrome.webview) {
            window.chrome.webview.addEventListener('message', function (e) {
                var d = e.data;
                if (typeof d === 'string') { try { d = JSON.parse(d) } catch (ex) { return; } }

                if (d.type === 'qr') updateQrCode(d.qrData);
                else if (d.type === 'showSetup') showSetupScreen();
                else if (d.type === 'hideSetup') hideSetupScreen();
                else if (d.type === 'setupError') showSetupError(d.error);
                else if (d.type === 'boardInfo') updateBoardInfo(d.info);
                else if (d.type === 'unlock') showUnlockAnimation(d);
                else if (d.type === 'hideUnlock') hideUnlockOverlay();
                else if (d.type === 'connectionStatus') {
                    var st = document.getElementById('connStatus');
                    if (d.online) {
                        st.className = 'connection-status online';
                        st.querySelector('.conn-text').textContent = 'Çevrimiçi';
                    } else {
                        st.className = 'connection-status offline';
                        st.querySelector('.conn-text').textContent = 'Çevrimdışı';
                    }
                }
                else if (d.type === 'updateAnnouncements') {
                    var annData = d.data;
                    if (typeof annData === 'string') {
                        try { annData = JSON.parse(annData); } catch (ex) { }
                    }
                    updateAnnouncements(annData);
                }
            });
        }
    </script>
</body>

</html>
